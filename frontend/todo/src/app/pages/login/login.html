<div class="pagina-login">
    <div class="fundo-aurora"></div>

    <div class="cartao-login">
        <div class="logo-login">
            <span class="logo-to">to</span>
            <span class="logo-do">DO</span>
        </div>

        <div class="alternador-modo">
            <button class="btn-modo" [class.ativo]="modoAtual === 'entrar'" (click)="alternarModo('entrar')">
                entrar
            </button>
            <button class="btn-modo" [class.ativo]="modoAtual === 'cadastrar'" (click)="alternarModo('cadastrar')">
                cadastre-se
            </button>
        </div>

        <form [formGroup]="formulario" (ngSubmit)="enviar()" class="formulario-login">
            @if (modoAtual === 'cadastrar') {
            <div class="campo-grupo">
                <label class="rotulo-campo">nome</label>
                <input class="campo-entrada" type="text" formControlName="nome" placeholder="seu nome completo">
            </div>
            }

            <div class="campo-grupo">
                <label class="rotulo-campo">e-mail</label>
                <input class="campo-entrada" type="email" formControlName="email" placeholder="seu@email.com">
            </div>

            <div class="campo-grupo">
                <label class="rotulo-campo">senha</label>
                <div class="campo-senha-wrapper">
                    <input class="campo-entrada campo-senha" [type]="senhaVisivel ? 'text' : 'password'"
                        formControlName="senha" placeholder="sua senha">
                    <button type="button" class="btn-olho" (click)="alternarSenhaVisivel()">
                        <span class="icone">{{ senhaVisivel ? 'visibility_off' : 'visibility' }}</span>
                    </button>
                </div>
            </div>

            @if (erro) {
            <div class="mensagem-erro">{{ erro }}</div>
            }

            <button type="submit" class="btn-primario" [disabled]="carregando">
                @if (!carregando) {
                <span>{{ modoAtual === 'entrar' ? 'entrar' : 'criar conta' }}</span>
                } @else {
                <span class="icone girando">progress_activity</span>
                }
            </button>
        </form>

        <div class="divisor">
            <span class="linha-divisor"></span>
            <span class="texto-divisor">ou</span>
            <span class="linha-divisor"></span>
        </div>

        <div #googleBtnContainer class="google-btn-oculto"></div>

        <button class="btn-google" (click)="entrarComGoogle()" [disabled]="carregando">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path fill="#4285F4"
                    d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z" />
                <path fill="#34A853"
                    d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z" />
                <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z" />
                <path fill="#EA4335"
                    d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z" />
            </svg>
            entrar com o Google
        </button>
    </div>
</div>
